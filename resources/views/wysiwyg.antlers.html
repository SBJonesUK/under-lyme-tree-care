<section class="section wysiwyg-page">

    <header class="wysiwyg-page__header">
      <h1 class="section-intro__title section-intro__title--h1">{{ title }}</h1>
    </header>

    {{ if body }}
      <div class="wysiwyg-page__content flow">
        {{ body }}
      </div>
    {{ /if }}
  </div>
</section>
