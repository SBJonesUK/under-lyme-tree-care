<figure class="block-media">
  <div class="block-media__grid block-media__grid--{{ columns ?? 1 }}">
    {{ assets }}
      <div class="block-media__item">
        {{ if is_video }}
          <video
            class="block-media__media block-media__video"
            autoplay
            loop
            muted
            playsinline
            aria-label="{{ alt ?? title }}"
          >
            <source src="{{ url }}" type="{{ mime_type }}">
            Your browser does not support the video tag.
          </video>
        {{ else }}
          <img
            src="{{ url }}"
            alt="{{ alt ?? title }}"
            class="block-media__media block-media__image"
          >
        {{ /if }}
      </div>
    {{ /assets }}
  </div>

  {{ if caption }}
    <figcaption class="block-media__caption">{{ caption }}</figcaption>
  {{ /if }}
</figure>
