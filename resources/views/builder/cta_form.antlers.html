<section class="cta-form {{ if theme && theme != 'theme-light' }} {{ theme }}{{ /if }}">
  <div class="container cta-form__inner">

    <div class="section-intro">
      {{ partial:section_intro_heading level="2" }}

      {{ if intro }}
        <p class="section-intro__description section-intro__description--large flow">
          {{ intro }}
        </p>
      {{ /if }}
    </div>

    {{ partial:contact_form }}

  </div>
</section>
