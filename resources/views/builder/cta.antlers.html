<section class="cta{{ if theme && theme != 'theme-light' }} {{ theme }}{{ /if }}">
  {{ if background_image }}
      {{ background_image }}
        <img src="{{ url }}" alt="" class="cta__image">
      {{ /background_image }}
  {{ /if }}

  <div class="container cta__inner">
    <div class="section-intro section-intro--center">
      {{ partial:section_intro_heading level="2" title_modifier="cta" }}

      {{ if intro }}
        <p class="section-intro__description section-intro__description--large">
          {{ intro }}
        </p>
      {{ /if }}

      {{ if button }}
        <div class="button-group button-group--center">
          {{ button }}
            <a href="{{ url }}" class="button button--{{ style }}">
              {{ label }}
            </a>
          {{ /button }}
        </div>
      {{ /if }}
    </div>
  </div>
</section>
