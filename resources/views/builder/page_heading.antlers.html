<section class="page-heading{{ if theme && theme != 'theme-light' }} {{ theme }}{{ /if }}">
  <div class="container page-heading__inner">
    <div class="section-intro">
      {{ partial:section_intro_heading level="1" }}

      {{ if intro }}
        <p class="section-intro__description section-intro__description--large">
          {{ intro }}
        </p>
      {{ /if }}
    </div>
  </div>
</section>
