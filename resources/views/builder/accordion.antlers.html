<section class="accordion{{ if theme && theme != 'theme-light' }} {{ theme }}{{ /if }}">
  <div class="container accordion__inner">
    <div class="section-intro">
      {{ partial:section_intro_heading level="2" }}

      {{ if intro }}
        <p class="section-intro__description section-intro__description--large">
          {{ intro }}
        </p>
      {{ /if }}
    </div>

    <div class="accordion__content">
      {{ if items }}
        <div class="accordion__items">
          {{ items }}
            <details class="accordion__item">
              <summary class="accordion__summary">
                <span class="accordion__question">{{ question }}</span>
                <span class="accordion__icon" aria-hidden="true"></span>
              </summary>

              {{ if answer }}
                <div class="accordion__answer flow">
                  {{ answer }}
                </div>
              {{ /if }}
            </details>
          {{ /items }}
        </div>
      {{ /if }}

      {{ if footer }}
        <div class="accordion__footer flow">
          {{ footer }}
        </div>
      {{ /if }}
    </div>
  </div>
</section>
