<section class="section case-studies-index">

    <div class="case-studies-index__header">
      <p class="case-studies-index__eyebrow">Case Study Category</p>
      <h1 class="case-studies-index__title">{{ term:title }}</h1>
      <p class="case-studies-index__intro">Case studies filed under {{ term:title | lower }}.</p>
    </div>

    <div class="case-studies-index__grid">
      {{ entries }}
        {{ partial:case_studies/card }}
      {{ /entries }}
    </div>
  </div>
</section>
