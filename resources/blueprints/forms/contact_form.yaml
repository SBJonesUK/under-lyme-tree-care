title: 'Contact Form'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              type: text
              display: Name
              validate:
                - required
                - string
                - max:120
          -
            handle: email_address
            field:
              type: text
              input_type: email
              autocomplete: email
              display: 'Email Address'
              validate:
                - required
                - email
                - max:255
          -
            handle: company
            field:
              type: text
              display: Company
              validate:
                - string
                - max:120
          -
            handle: message
            field:
              type: textarea
              display: Message
              validate:
                - required
                - string
                - max:5000
          -
            handle: privacy_policy
            field:
              type: checkboxes
              display: 'Privacy Policy'
              inline: true
              options:
                -
                  key: agree
                  value: 'I have read and agree to the <a href="/privacy-policy">Privacy Policy</a>.'
              validate:
                - required
