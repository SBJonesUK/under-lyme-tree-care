title: 'Footer'
tabs:
  main:
    display: Main
    sections:
      -
        display: Column Headings
        fields:
          -
            handle: column_one_heading
            field:
              type: text
              display: 'Column One Heading'
              required: true
          -
            handle: column_two_heading
            field:
              type: text
              display: 'Column Two Heading'
              required: true
          -
            handle: contact_heading
            field:
              type: text
              display: 'Contact Heading'
              required: true
          -
            handle: social_heading
            field:
              type: text
              display: 'Social Heading'
              required: true
      -
        display: Social
        fields:
          -
            handle: social_links
            field:
              type: grid
              display: 'Social Links'
              min_rows: 0
              fields:
                -
                  handle: platform
                  field:
                    type: select
                    display: Platform
                    options:
                      facebook: Facebook
                      instagram: Instagram
                      linkedin: LinkedIn
                      x: X
                      youtube: YouTube
                      tiktok: TikTok
                    required: true
                -
                  handle: url
                  field:
                    type: link
                    display: URL
                    required: true
