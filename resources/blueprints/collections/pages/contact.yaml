title: Contact
hide: true
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              validate: required
          -
            handle: template
            field:
              type: hidden
              default: contact
          -
            handle: eyebrow
            field:
              type: text
              display: Eyebrow
          -
            handle: intro
            field:
              type: textarea
              display: Intro
          -
            handle: form_title
            field:
              type: text
              display: 'Form Title'
          -
            handle: form_intro
            field:
              type: textarea
              display: 'Form Intro'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              validate: 'max:200'
