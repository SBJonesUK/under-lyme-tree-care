title: Page
fields:
  -
    handle: title
    field:
      type: text
      display: Title
      validate: required

  -
    handle: page_builder
    field:
      type: replicator
      display: Page Builder
      collapse: true
      sets:
        hero:
          display: Hero
          fields:
            -
              import: builder/hero
        page_heading:
          display: Page Heading
          fields:
            -
              import: builder/page_heading
        text_media:
          display: Text + Media
          fields:
            -
              import: builder/text_media
        text:
          display: Text
          fields:
            -
              import: builder/text
        stats:
          display: Stats
          fields:
            -
              import: builder/stats
        featured_blog_posts:
          display: Featured Blog Posts
          fields:
            -
              import: builder/featured_blog_posts
        gallery:
          display: Gallery
          fields:
            -
              import: builder/gallery
        accordion:
          display: Accordion
          fields:
            -
              import: builder/accordion
        timeline:
          display: Timeline
          fields:
            -
              import: builder/timeline
        media:
          display: Media
          fields:
            -
              import: builder/media
        icon_cards:
          display: Features
          fields:
            -
              import: builder/icon_cards
        image_cards:
          display: Image Cards
          fields:
            -
              import: builder/image_cards
        logos:
          display: Logos
          fields:
            -
              import: builder/logos
        testimonials:
          display: Testimonials
          fields:
            -
              import: builder/testimonials
        cta:
          display: CTA
          fields:
            -
              import: builder/cta
        cta_form:
          display: CTA Form
          fields:
            -
              import: builder/cta_form
