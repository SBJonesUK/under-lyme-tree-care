title: Case Study
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              container: assets
              max_files: 1
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
          -
            handle: client_name
            field:
              type: text
              display: Client Name
          -
            handle: client_company
            field:
              type: text
              display: Client Company
          -
            handle: content
            field:
              type: bard
              display: Content
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - anchor
              remove_empty_nodes: false
              sets:
                media_001:
                  display: Media
                  fields:
                    -
                      import: blocks/media_001
                quote_001:
                  display: Quote
                  fields:
                    -
                      import: blocks/quote_001
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              validate: 'max:200'
          -
            handle: case_study_categories
            field:
              type: terms
              taxonomies:
                - case_study_categories
              display: Categories
              mode: select
