title: Testimonials
fields:
  -
    handle: eyebrow
    field:
      type: text
      display: Eyebrow

  -
    handle: title
    field:
      type: text
      display: Title
      validate: required

  -
    handle: intro
    field:
      type: textarea
      display: Intro

  -
    handle: testimonials_per_row
    field:
      type: button_group
      display: Testimonials Per Row
      options:
        2: '2'
        3: '3'
        4: '4'
      default: 3
      instructions: Choose how many testimonials to show per row on larger screens.

  -
    handle: testimonials
    field:
      type: replicator
      display: Testimonials
      collapse: true
      min_sets: 1
      sets:
        testimonial:
          display: Testimonial
          fields:
            -
              handle: quote
              field:
                type: textarea
                display: Quote
                validate: required

            -
              handle: name
              field:
                type: text
                display: Client Name
                validate: required

            -
              handle: details
              field:
                type: text
                display: Job Title / Company

  -
    handle: button
    field:
      type: replicator
      display: Button
      collapse: true
      max_sets: 1
      sets:
        button:
          display: Button
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
                validate: required

            -
              handle: url
              field:
                type: link
                display: URL

            -
              handle: style
              field:
                type: select
                display: Style
                options:
                  primary: Primary
                  secondary: Secondary
                default: primary

  -
    handle: theme
    field:
      type: select
      display: Theme
      options:
        theme-light: Light
        theme-muted: Muted
        theme-accent: Accent
        theme-dark: Dark
      default: theme-light
