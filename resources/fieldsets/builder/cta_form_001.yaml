title: CTA Form
fields:
  -
    handle: eyebrow
    field:
      type: text
      display: Eyebrow

  -
    handle: title
    field:
      type: text
      display: Title
      validate: required

  -
    handle: intro
    field:
      type: textarea
      display: Intro

  -
    handle: theme
    field:
      type: select
      display: Theme
      options:
        theme-muted: Muted
        theme-accent: Accent
        theme-dark: Dark
      default: theme-light
