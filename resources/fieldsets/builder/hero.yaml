title: Hero (Split)
fields:
  -
    handle: lead_content
    field:
      type: button_group
      display: Content Above Title
      options:
        rating: Rating
        eyebrow: Eyebrow
      default: rating

  -
    handle: eyebrow
    field:
      type: text
      display: Eyebrow
      if:
        lead_content: 'equals eyebrow'

  -
    handle: rating_text
    field:
      type: text
      display: Rating Text
      if:
        lead_content: 'equals rating'

  -
    handle: title
    field:
      type: text
      display: Title
      validate: required

  -
    handle: intro
    field:
      type: textarea
      display: Intro

  -
    handle: buttons
    field:
      type: replicator
      display: Buttons
      collapse: true
      max_sets: 2
      sets:
        button:
          display: Button
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
                validate: required

            -
              handle: url
              field:
                type: link
                display: URL

            -
              handle: style
              field:
                type: select
                display: Style
                options:
                  primary: Primary
                  secondary: Secondary
                default: primary

  -
    handle: usps
    field:
      type: replicator
      display: USPs
      collapse: true
      max_sets: 4
      sets:
        item:
          display: USP
          fields:
            -
              handle: text
              field:
                type: text
                display: Text
                validate: required

  -
    handle: image
    field:
      type: assets
      display: Image
      container: assets
      max_files: 1

  -
    handle: theme
    field:
      type: select
      display: Theme
      options:
        theme-light: Light
        theme-muted: Muted
        theme-accent: Accent
        theme-dark: Dark
      default: theme-light
