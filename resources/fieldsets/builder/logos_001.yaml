title: Logos
fields:
  -
    handle: text
    field:
      type: text
      display: Text
      instructions: Add a short line of text to sit above the logos.

  -
    handle: items
    field:
      type: replicator
      display: Logos
      collapse: true
      min_sets: 1
      sets:
        item:
          display: Logo
          fields:
            -
              handle: logo
              field:
                type: assets
                display: Logo
                container: assets
                max_files: 1
                validate: required
                instructions: Upload or select a logo image. SVG, PNG, and WebP all work well.

            -
              handle: name
              field:
                type: text
                display: Name
                instructions: Used as fallback alt text if the image does not have alt text set.

            -
              handle: url
              field:
                type: link
                display: URL
                instructions: Optional. Link the logo to a page or external website.

            -
              handle: logo_height
              field:
                type: float
                display: Logo Height
                instructions: Fine tune the height of your logo. The higher the number, the bigger the height; the lower the number, the smaller the height.
                default: 2
                min: 1
                max: 12
                step: 0.1

  -
    handle: theme
    field:
      type: select
      display: Theme
      options:
        theme-light: Light
        theme-muted: Muted
        theme-accent: Accent
        theme-dark: Dark
      default: theme-light
